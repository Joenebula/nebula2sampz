name: Build

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false     # one platform failing shouldn't hide the other's result
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      # pluginval is Tracktion's validator: it abuses the plugin the way real hosts do —
      # state round-trips, parameter fuzzing, buffer-size and sample-rate changes, editor
      # open/close under load, threading. Strictness 10 is the maximum. It catches the class
      # of bug that only ever shows up in someone else's DAW.
      #
      # RUN IT 5 TIMES. pluginval RANDOMISES its parameter values, so a single green run is
      # one sample, not a pass. This mattered: a real state-restoration bug (bool params
      # keeping an un-snapped float) failed 1-3 tests PER RUN on a random subset of the
      # bools, and a single lucky run had it recorded as "passed at strictness 10, first
      # try" for weeks. One run cannot distinguish "correct" from "correct this time".
      - name: pluginval (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl -L -o pluginval.zip https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_Windows.zip
          Expand-Archive pluginval.zip -DestinationPath pluginval_bin
          $exe = Get-ChildItem -Recurse -Filter pluginval.exe -Path pluginval_bin | Select-Object -First 1
          $vst3 = Get-ChildItem -Recurse -Directory -Filter "Nebula2.vst3" -Path build | Select-Object -First 1
          if (-not $vst3) { throw "no VST3 found to validate" }
          Write-Host "validating $($vst3.FullName)"
          for ($i = 1; $i -le 5; $i++) {
            Write-Host "--- pluginval run $i of 5"
            & $exe.FullName --strictness-level 10 --validate-in-process --timeout-ms 600000 --validate "$($vst3.FullName)"
            if ($LASTEXITCODE -ne 0) { throw "pluginval FAILED on run $i of 5 (exit $LASTEXITCODE). A randomised gate failing intermittently is a finding, not noise — do not re-roll it." }
          }
          Write-Host "pluginval: 5/5 passed at strictness 10"

      # Run under lldb so a CRASH yields a BACKTRACE, not just "Abort trap: 6".
      #
      # This exists because run 5 of 5 died with `std::bad_function_call` — an intermittent,
      # macOS-only crash that 12/12 clean runs on Windows cannot reproduce and that reading
      # the source has not located (every std::function in our code and in the JUCE paths
      # involved is either guarded or defaulted). A crash outranks a failed assertion: it's
      # lost work in someone's session. Guessing without a stack is how you "fix" a crash
      # three times and never touch it.
      #
      # `-k` commands run ONLY if the target crashes, so a passing run costs nothing.
      - name: pluginval (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -L -o pluginval.zip https://github.com/Tracktion/pluginval/releases/latest/download/pluginval_macOS.zip
          unzip -q pluginval.zip
          VST3=$(find build -name "Nebula2.vst3" -maxdepth 6 | head -1)
          if [ -z "$VST3" ]; then echo "no VST3 found to validate"; exit 1; fi
          echo "validating $VST3"
          PV=./pluginval.app/Contents/MacOS/pluginval
          for i in 1 2 3 4 5; do
            echo "--- pluginval run $i of 5"
            set +e
            lldb --batch -o run -k "thread backtrace all" -k "quit" \
                 -- "$PV" --strictness-level 10 --validate-in-process \
                          --timeout-ms 600000 --validate "$VST3" > pv-$i.log 2>&1
            set -e
            if grep -qE "\*\*\* FAILED|stop reason|Abort trap|bad_function_call" pv-$i.log; then
              echo "=============== pluginval FAILED on run $i of 5 ==============="
              echo "A randomised gate failing intermittently is a finding, not noise — do not re-roll it."
              echo "--- tail of the log (includes the backtrace if it crashed):"
              tail -140 pv-$i.log
              exit 1
            fi
            tail -2 pv-$i.log
          done
          echo "pluginval: 5/5 passed at strictness 10"

      - name: Upload pluginval logs on failure
        if: failure() && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: pluginval-macos-logs
          path: pv-*.log
          if-no-files-found: ignore

      - name: Upload VST3
        uses: actions/upload-artifact@v4
        with:
          name: Nebula2-VST3-${{ matrix.os }}
          path: |
            build/**/*.vst3
          if-no-files-found: error
